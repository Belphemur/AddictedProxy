# docker-compose.dev.yml
#
# Local UI development stack: mock API server + Nuxt hot-reload frontend.
# No real .NET backend or database required.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Frontend available at:  http://localhost:3000
# Mock API available at:  http://localhost:8080

services:

  # ── Mock API server ──────────────────────────────────────────────────────────
  # Serves all REST + SignalR endpoints the frontend needs.
  # See mock-server/README.md for the full endpoint list.
  mock-api:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ── Nuxt dev server ──────────────────────────────────────────────────────────
  # Runs `pnpm dev --host` with the source tree bind-mounted so edits on the
  # host are reflected instantly via Vite HMR.
  frontend:
    build:
      context: ./addicted.nuxt
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "24678:24678"   # Vite HMR websocket
    volumes:
      # Bind-mount the entire frontend source for live editing.
      - ./addicted.nuxt:/app
      # Keep the container's node_modules isolated from the host to avoid
      # platform-specific binary mismatches.
      - /app/node_modules
    environment:
      # Point both client-side and server-side fetches at the mock API.
      # Inside Docker the service is reachable by its service name.
      APP_API_PATH: "http://localhost:8080"
      APP_SERVER_PATH: "http://mock-api:8080"
      APP_URL: "http://localhost:3000"
      # Disable Sentry in the dev stack.
      SENTRY_ENABLE: "false"
      # Nuxt devtools
      NUXT_DEVTOOLS_ENABLED: "true"
    depends_on:
      - mock-api
    restart: unless-stopped
